name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    name: Validar aplicativo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run validate

  deploy:
    name: Publicar no GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copiar arquivos estáticos para publicação
        run: |
          mkdir -p public
          cp index.html styles.css script.js public/
      - name: Deploy para gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
